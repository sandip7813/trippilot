# TripPilot — local database services
# Start:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v   (deletes all data)

services:
    mysql:
        image: mysql:8.4
        container_name: trippilot-mysql
        restart: unless-stopped
        ports:
            - '${FORWARD_DB_PORT:-3307}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
            MYSQL_DATABASE: '${DB_DATABASE:-trippilot}'
            MYSQL_USER: '${DB_USERNAME:-trippilot}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - trippilot-mysql:/var/lib/mysql
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
            interval: 10s
            timeout: 5s
            retries: 5

    mongodb:
        image: mongo:7
        container_name: trippilot-mongodb
        restart: unless-stopped
        ports:
            - '${FORWARD_MONGODB_PORT:-27017}:27017'
        environment:
            MONGO_INITDB_DATABASE: '${MONGODB_DATABASE:-trippilot}'
        volumes:
            - trippilot-mongodb:/data/db
        healthcheck:
            test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    trippilot-mysql:
    trippilot-mongodb:
